<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FocusForest — Detection Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: monospace; display: flex; gap: 24px; padding: 24px; min-height: 100vh; }

    .video-wrap { position: relative; flex-shrink: 0; }
    video  { width: 480px; height: 360px; border-radius: 8px; transform: scaleX(-1); display: block; }
    canvas { position: absolute; top: 0; left: 0; width: 480px; height: 360px; border-radius: 8px; transform: scaleX(-1); pointer-events: none; }

    .panel { display: flex; flex-direction: column; gap: 12px; min-width: 300px; max-width: 320px; }

    /* Score ring */
    .score-wrap { display: flex; align-items: center; gap: 16px; background: #1e2130; border-radius: 8px; padding: 12px 16px; }
    .score-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring .track { fill: none; stroke: #2d3748; stroke-width: 6; }
    .score-ring .fill  { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.3s, stroke 0.3s; }
    .score-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: bold; }
    .score-label { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
    .score-info { flex: 1; }
    .score-info .tree-health { font-size: 0.85rem; color: #94a3b8; }
    .score-info .tree-emoji { font-size: 1.8rem; line-height: 1; }

    /* Status */
    .status-box { padding: 12px 16px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; text-align: center; transition: background 0.3s; }
    .status-focused      { background: #14532d; color: #86efac; }
    .status-questionable { background: #713f12; color: #fde68a; }
    .status-distracted   { background: #7f1d1d; color: #fca5a5; }
    .status-away         { background: #1e1b4b; color: #a5b4fc; }
    .status-recovering   { background: #164e63; color: #67e8f9; }

    /* Countdowns */
    .countdown { font-size: 2.2rem; text-align: center; font-weight: bold; }
    .q-cd { color: #fde68a; }
    .d-cd { color: #f87171; }
    .r-cd { color: #67e8f9; font-size: 1.1rem; padding: 6px; }

    /* Warning pills */
    .warnings { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
    .pill { background: #7f1d1d; color: #fca5a5; border-radius: 99px; padding: 3px 10px; font-size: 0.72rem; }
    .pill.soft { background: #713f12; color: #fde68a; }
    .no-warnings { color: #334155; font-size: 0.75rem; align-self: center; }

    /* Mode + slider */
    .mode-toggle { display: flex; gap: 8px; }
    button { flex: 1; padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-family: monospace; font-size: 0.85rem; background: #1e2130; color: #94a3b8; }
    button.active { background: #3b82f6; color: white; }
    .slider-row { background: #1e2130; border-radius: 8px; padding: 10px 12px; }
    .slider-row label { color: #64748b; font-size: 0.75rem; display: flex; justify-content: space-between; margin-bottom: 6px; }
    input[type=range] { width: 100%; accent-color: #3b82f6; }

    /* Metrics */
    .metrics { background: #1e2130; border-radius: 8px; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.8rem; }
    .ml { color: #64748b; }
    .mv { color: #94a3b8; }
    .mv.warn { color: #fbbf24; }
    .mv.bad  { color: #f87171; }

    /* Thresholds */
    .thresholds { background: #1e2130; border-radius: 8px; padding: 10px 12px; font-size: 0.72rem; color: #64748b; }
    .thresholds h3 { color: #94a3b8; margin-bottom: 6px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .tr { display: flex; justify-content: space-between; margin-bottom: 3px; }

    /* Log */
    .log { background: #1e2130; border-radius: 8px; padding: 10px; font-size: 0.7rem; height: 110px; overflow-y: auto; color: #64748b; }
    .le { margin-bottom: 3px; }
    .le.warn  { color: #fbbf24; }
    .le.error { color: #f87171; }
    .le.ok    { color: #86efac; }
    .le.info  { color: #67e8f9; }
  </style>
</head>
<body>

<div class="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div class="panel">
  <div class="mode-toggle">
    <button id="btn-coding" class="active" onclick="setMode('coding')">💻 Coding</button>
    <button id="btn-writing" onclick="setMode('writing')">✏️ Writing</button>
  </div>

  <!-- Attention score ring -->
  <div class="score-wrap">
    <div class="score-ring">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="track" cx="36" cy="36" r="30"/>
        <circle class="fill" id="score-arc" cx="36" cy="36" r="30"
          stroke-dasharray="188.5" stroke-dashoffset="0"/>
      </svg>
      <div class="score-num" id="score-num">100</div>
    </div>
    <div class="score-info">
      <div class="tree-emoji" id="tree-emoji">🌳</div>
      <div class="tree-health" id="tree-health">Healthy</div>
      <div class="score-label">attention score</div>
    </div>
  </div>

  <div id="status-box" class="status-box status-focused">FOCUSED ✓</div>
  <div id="countdown" class="countdown" style="display:none"></div>

  <!-- Active warning pills -->
  <div class="warnings" id="warnings">
    <span class="no-warnings">no issues detected</span>
  </div>

  <!-- Writing pitch slider -->
  <div class="slider-row" id="pitch-slider-wrap" style="display:none">
    <label><span>Look-down limit (writing)</span><span id="pitch-limit-val">-40°</span></label>
    <input type="range" id="pitch-slider" min="-70" max="-10" value="-40"
      oninput="updatePitchLimit(this.value)" />
  </div>

  <div class="metrics">
    <span class="ml">Pitch</span>    <span id="pitch"  class="mv">0°</span>
    <span class="ml">Yaw</span>      <span id="yaw"    class="mv">0°</span>
    <span class="ml">Blink L/R</span><span id="blink"  class="mv">—</span>
    <span class="ml">Gaze out</span> <span id="gaze"   class="mv">—</span>
    <span class="ml">Hand lap</span> <span id="lap"    class="mv">—</span>
    <span class="ml">Phone</span>    <span id="phone"  class="mv">—</span>
  </div>

  <div class="thresholds" id="thresh-display"></div>
  <div class="log" id="log"></div>
</div>

<script type="module">
import {
  FaceLandmarker,
  HandLandmarker,
  ObjectDetector,
  FilesetResolver,
  DrawingUtils,
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── Thresholds ──────────────────────────────────────────────────────────────
const T = {
  coding:  { yawLimit:25, pitchUpLimit:20, pitchDownLimit:-25, questionableScore:70, distractedScore:50, recoveryScore:75, questionableSecs:20, distractedSecs:10, awaySecs:3, recoverySecs:3 },
  writing: { yawLimit:30, pitchUpLimit:20, pitchDownLimit:-40, questionableScore:70, distractedScore:50, recoveryScore:75, questionableSecs:20, distractedSecs:10, awaySecs:3, recoverySecs:3 },
};

// ── Attention scorer ────────────────────────────────────────────────────────
const BLINK_T = 0.55, GAZE_OUT_T = 0.45;
let smoothedScore = 100;
function resetScorer() { smoothedScore = 100; }

function computeScore(pose, bs, phone, handInLap, t) {
  const warnings = [];
  let penalty = 0;

  const yawAbs = Math.abs(pose.yaw);
  if (yawAbs > t.yawLimit) {
    penalty += Math.min(40, (yawAbs - t.yawLimit) * 2.2);
    warnings.push(pose.yaw > 0 ? "looking right" : "looking left");
  }
  if (pose.pitch > t.pitchUpLimit) {
    penalty += Math.min(35, (pose.pitch - t.pitchUpLimit) * 2.5);
    warnings.push("looking up");
  } else if (pose.pitch < t.pitchDownLimit) {
    penalty += Math.min(35, (Math.abs(pose.pitch) - Math.abs(t.pitchDownLimit)) * 2.5);
    warnings.push("looking down");
  }

  const avgBlink = (bs.eyeBlinkLeft + bs.eyeBlinkRight) / 2;
  if (avgBlink > BLINK_T) {
    penalty += Math.min(25, ((avgBlink - BLINK_T) / (1 - BLINK_T)) * 30);
    if (avgBlink > 0.75) warnings.push("eyes closing");
  }

  const gazeOut = Math.max(bs.eyeLookOutLeft, bs.eyeLookOutRight);
  if (gazeOut > GAZE_OUT_T) {
    penalty += Math.min(20, (gazeOut - GAZE_OUT_T) * 40);
    if (gazeOut > 0.55) warnings.push("eyes looking away");
  }

  if (phone) { penalty += 40; warnings.push("phone detected"); }
  if (handInLap) { penalty += 20; warnings.push("hand in lap"); }
  if (!pose.facePresent) { return { score: 0, warnings: ["face not visible"] }; }

  const raw = Math.max(0, Math.min(100, 100 - penalty));
  const alpha = raw < smoothedScore ? 0.12 : 0.25;
  smoothedScore = smoothedScore * (1 - alpha) + raw * alpha;
  return { score: Math.round(smoothedScore), warnings };
}

function getBlendshape(cats, name) { return cats.find(c => c.categoryName === name)?.score ?? 0; }

// ── State machine ───────────────────────────────────────────────────────────
class SM {
  constructor() { this.reset(); }
  reset() {
    this.status = "focused";
    this.qStartMs = null;
    this.dStartMs = null;
    this.rStartMs = null;
    this.rFrom    = null;
    this.awayMs   = null;
  }
  tick({ facePresent, score, t, nowMs }) {
    if (!facePresent) {
      if (!this.awayMs) this.awayMs = nowMs;
      if ((nowMs - this.awayMs) / 1000 >= t.awaySecs) { this.status = "away"; this.rStartMs = null; }
      return { status: this.status, cd: null, rc: null, failed: false };
    }
    this.awayMs = null;

    const good  = score >= t.recoveryScore;
    const quest = score < t.questionableScore && score >= t.distractedScore;
    const dist  = score < t.distractedScore;

    // recovery
    if (good && ["questionable","distracted","recovering"].includes(this.status)) {
      if (!this.rStartMs) { this.rStartMs = nowMs; this.rFrom = this.status === "recovering" ? this.rFrom : this.status; this.status = "recovering"; }
      const rem = Math.max(0, t.recoverySecs - (nowMs - this.rStartMs) / 1000);
      if (rem === 0) { this.status = "focused"; this.qStartMs = this.dStartMs = this.rStartMs = this.rFrom = null; return { status:"focused", cd:null, rc:null, failed:false }; }
      return { status:"recovering", cd:null, rc:Math.ceil(rem), failed:false };
    }
    if (!good && this.status === "recovering") { this.status = this.rFrom ?? "questionable"; this.rStartMs = null; }

    if (this.status === "focused") {
      if (!quest && !dist) return { status:"focused", cd:null, rc:null, failed:false };
      if (dist) { this.status = "distracted"; this.dStartMs = nowMs; }
      else      { this.status = "questionable"; this.qStartMs = nowMs; }
    }

    if (this.status === "questionable") {
      if (dist) { this.status = "distracted"; this.dStartMs = nowMs; this.qStartMs = null; }
      else {
        if (!this.qStartMs) this.qStartMs = nowMs;
        const rem = Math.max(0, t.questionableSecs - (nowMs - this.qStartMs) / 1000);
        if (rem === 0) { this.status = "distracted"; this.dStartMs = nowMs; this.qStartMs = null; }
        else return { status:"questionable", cd:Math.ceil(rem), rc:null, failed:false };
      }
    }

    if (this.status === "distracted") {
      if (!this.dStartMs) this.dStartMs = nowMs;
      const rem = Math.max(0, t.distractedSecs - (nowMs - this.dStartMs) / 1000);
      if (rem === 0) return { status:"distracted", cd:0, rc:null, failed:true };
      return { status:"distracted", cd:Math.ceil(rem), rc:null, failed:false };
    }

    return { status:this.status, cd:null, rc:null, failed:false };
  }
}

// ── Head pose ───────────────────────────────────────────────────────────────
function headPose(result) {
  if (!result.facialTransformationMatrixes?.length) return { pitch:0, yaw:0, facePresent:false };
  const m = result.facialTransformationMatrixes[0].data;
  const toDeg = r => r * 180 / Math.PI;
  const pitch = toDeg(Math.atan2(-m[9], m[10]));
  const yaw   = -toDeg(Math.atan2(m[8], Math.sqrt(m[9]**2 + m[10]**2)));
  return { pitch, yaw, facePresent: true };
}

// ── Hand analysis ───────────────────────────────────────────────────────────
function analyzeHands(result, phoneBbox) {
  if (!result.landmarks?.length) return { handInLap:false, handNearPhone:false };
  const maxWristY = Math.max(...result.landmarks.map(h => h[0].y));
  let handNearPhone = false;
  if (phoneBbox) {
    outer: for (const hand of result.landmarks)
      for (const lm of hand)
        if (lm.x >= phoneBbox.xMin && lm.x <= phoneBbox.xMax && lm.y >= phoneBbox.yMin && lm.y <= phoneBbox.yMax) { handNearPhone = true; break outer; }
  }
  return { handInLap: maxWristY > 0.70, handNearPhone };
}

// ── Gaze arrow ──────────────────────────────────────────────────────────────
function drawGazeArrow(ctx, landmarks, pose, score, cw, ch) {
  if (!landmarks?.length) return;
  const lm = landmarks[0];
  // Nose tip = index 1
  const noseTip = lm[1];
  const x = noseTip.x * cw;
  const y = noseTip.y * ch;

  // Direction from yaw/pitch
  const radYaw   = -pose.yaw   * Math.PI / 180;  // negate for canvas coords
  const radPitch =  pose.pitch * Math.PI / 180;
  const len = 55;
  const dx = Math.sin(radYaw)   * len;
  const dy = Math.sin(radPitch) * len;

  // Color by score
  const color = score >= 70 ? "#52b788" : score >= 50 ? "#fbbf24" : "#ef4444";

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + dx, y + dy);
  ctx.stroke();

  // Arrowhead
  const angle = Math.atan2(dy, dx);
  const headLen = 12;
  ctx.beginPath();
  ctx.moveTo(x + dx, y + dy);
  ctx.lineTo(x + dx - headLen * Math.cos(angle - 0.4), y + dy - headLen * Math.sin(angle - 0.4));
  ctx.moveTo(x + dx, y + dy);
  ctx.lineTo(x + dx - headLen * Math.cos(angle + 0.4), y + dy - headLen * Math.sin(angle + 0.4));
  ctx.stroke();
  ctx.restore();
}

// ── Score ring ──────────────────────────────────────────────────────────────
const ARC_LEN = 188.5; // 2π × 30
function updateScoreRing(score) {
  const offset = ARC_LEN * (1 - score / 100);
  const arc = document.getElementById("score-arc");
  arc.style.strokeDashoffset = offset;
  const color = score >= 70 ? "#52b788" : score >= 50 ? "#fbbf24" : "#ef4444";
  arc.style.stroke = color;
  document.getElementById("score-num").textContent = score;
  document.getElementById("score-num").style.color = color;

  const treeEl = document.getElementById("tree-emoji");
  const healthEl = document.getElementById("tree-health");
  if (score >= 80)       { treeEl.textContent = "🌳"; healthEl.textContent = "Healthy"; healthEl.style.color = "#52b788"; }
  else if (score >= 65)  { treeEl.textContent = "🌿"; healthEl.textContent = "Slightly distracted"; healthEl.style.color = "#86efac"; }
  else if (score >= 50)  { treeEl.textContent = "🍂"; healthEl.textContent = "Wilting…"; healthEl.style.color = "#fbbf24"; }
  else if (score >= 25)  { treeEl.textContent = "🪵"; healthEl.textContent = "Dying!"; healthEl.style.color = "#f87171"; }
  else                   { treeEl.textContent = "💀"; healthEl.textContent = "Critical!"; healthEl.style.color = "#ef4444"; }
}

// ── Warning pills ───────────────────────────────────────────────────────────
function updateWarnings(warnings) {
  const el = document.getElementById("warnings");
  if (!warnings.length) { el.innerHTML = '<span class="no-warnings">no issues detected</span>'; return; }
  el.innerHTML = warnings.map(w => `<span class="pill">${w}</span>`).join("");
}

// ── Setup ───────────────────────────────────────────────────────────────────
const video  = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");

let mode = "coding";
let faceLandmarker, handLandmarker, objectDetector, drawingUtils;
let sm = new SM();
let prevStatus = "focused";
let sessionFailed = false;
let phoneFrame = 0;
let lastPhone = { detected: false, bbox: null };

window.setMode = m => {
  mode = m;
  document.getElementById("btn-coding").className  = m === "coding"  ? "active" : "";
  document.getElementById("btn-writing").className = m === "writing" ? "active" : "";
  document.getElementById("pitch-slider-wrap").style.display = m === "writing" ? "block" : "none";
  sm.reset(); resetScorer(); sessionFailed = false;
  renderThresholds();
  log(`Mode → ${m}`, "info");
};

window.updatePitchLimit = val => {
  T.writing.pitchDownLimit = Number(val);
  document.getElementById("pitch-limit-val").textContent = `${val}°`;
  renderThresholds();
};

function renderThresholds() {
  const t = T[mode];
  document.getElementById("thresh-display").innerHTML = `
    <h3>Thresholds (${mode})</h3>
    <div class="tr"><span>Yaw limit</span><span>±${t.yawLimit}°</span></div>
    <div class="tr"><span>Pitch up / down</span><span>${t.pitchUpLimit}° / ${t.pitchDownLimit}°</span></div>
    <div class="tr"><span>Questionable below</span><span>score &lt; ${t.questionableScore} (${t.questionableSecs}s)</span></div>
    <div class="tr"><span>Distracted below</span><span>score &lt; ${t.distractedScore} (${t.distractedSecs}s)</span></div>
    <div class="tr"><span>Recovery hold</span><span>score ≥ ${t.recoveryScore} for ${t.recoverySecs}s</span></div>
  `;
}

const logEl = document.getElementById("log");
function log(msg, type = "") {
  const d = document.createElement("div");
  d.className = `le ${type}`;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.prepend(d);
  if (logEl.children.length > 60) logEl.lastChild.remove();
}

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  log("Webcam ready", "ok");

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
    runningMode: "VIDEO", numFaces: 1,
    outputFacialTransformationMatrixes: true,
    outputFaceBlendshapes: true,
  });
  log("FaceLandmarker ready", "ok");

  try {
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
      runningMode: "VIDEO", numHands: 2,
    });
    log("HandLandmarker ready", "ok");
  } catch { log("HandLandmarker failed", "warn"); }

  try {
    objectDetector = await ObjectDetector.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite", delegate: "GPU" },
      runningMode: "VIDEO", scoreThreshold: 0.6, categoryAllowlist: ["cell phone"],
    });
    log("Phone detector ready", "ok");
  } catch { log("Phone detector failed", "warn"); }

  drawingUtils = new DrawingUtils(ctx);
  renderThresholds();
  loop();
}

// ── Loop ─────────────────────────────────────────────────────────────────────
function loop() {
  if (video.readyState < 2) { requestAnimationFrame(loop); return; }
  const nowMs = performance.now();
  const t = T[mode];
  const cw = canvas.width, ch = canvas.height;

  // Face
  const fr = faceLandmarker.detectForVideo(video, nowMs);
  const pose = headPose(fr);
  const cats = fr.faceBlendshapes?.[0]?.categories ?? [];
  const bs = {
    eyeBlinkLeft:     getBlendshape(cats, "eyeBlinkLeft"),
    eyeBlinkRight:    getBlendshape(cats, "eyeBlinkRight"),
    eyeLookOutLeft:   getBlendshape(cats, "eyeLookOutLeft"),
    eyeLookOutRight:  getBlendshape(cats, "eyeLookOutRight"),
    eyeLookDownLeft:  getBlendshape(cats, "eyeLookDownLeft"),
    eyeLookDownRight: getBlendshape(cats, "eyeLookDownRight"),
  };

  // Phone (every 10 frames)
  if (objectDetector && ++phoneFrame % 10 === 0) {
    const r = objectDetector.detectForVideo(video, nowMs);
    const d = r.detections.find(d => d.categories.some(c => c.categoryName === "cell phone" && c.score >= 0.6));
    if (!d?.boundingBox) { lastPhone = { detected: false, bbox: null }; }
    else {
      const b = d.boundingBox, w = cw, h = ch;
      lastPhone = { detected: true, bbox: { xMin: b.originX/w, yMin: b.originY/h, xMax: (b.originX+b.width)/w, yMax: (b.originY+b.height)/h } };
    }
  }

  // Hands
  let hands = { handInLap: false, handNearPhone: false };
  if (handLandmarker) hands = analyzeHands(handLandmarker.detectForVideo(video, nowMs), lastPhone.bbox);

  const phoneDetected = lastPhone.detected;
  const { score, warnings } = computeScore(pose, bs, phoneDetected, hands.handInLap, t);

  // Draw
  ctx.clearRect(0, 0, cw, ch);
  if (fr.faceLandmarks?.length) {
    for (const lm of fr.faceLandmarks) {
      drawingUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_TESSELATION, { color: "#2d6a4f", lineWidth: 1 });
      drawingUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,  { color: "#52b788", lineWidth: 2 });
      drawingUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,   { color: "#52b788", lineWidth: 2 });
      drawingUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_FACE_OVAL,  { color: "#40916c", lineWidth: 2 });
    }
  }
  drawGazeArrow(ctx, fr.faceLandmarks, pose, score, cw, ch);

  if (!sessionFailed) {
    const out = sm.tick({ facePresent: pose.facePresent, score, t, nowMs });
    if (out.failed) { sessionFailed = true; log("🌳💀 SESSION FAILED — tree died", "error"); }
    if (out.status !== prevStatus) {
      log(`${prevStatus} → ${out.status} (score: ${score})`, out.status === "focused" ? "ok" : out.status === "recovering" ? "info" : "warn");
      prevStatus = out.status;
    }
    updateUI(out, pose, bs, hands, phoneDetected, score, warnings);
  }

  requestAnimationFrame(loop);
}

function updateUI(out, pose, bs, hands, phone, score, warnings) {
  updateScoreRing(score);
  updateWarnings(warnings);

  const box = document.getElementById("status-box");
  box.className = `status-box status-${out.status}`;
  const labels = { focused:"FOCUSED ✓", questionable:"⚠ QUESTIONABLE", distracted:"✗ DISTRACTED", away:"AWAY", recovering:"↩ RECOVERING" };
  box.textContent = labels[out.status];

  const cd = document.getElementById("countdown");
  if (out.rc !== null) {
    cd.style.display = "block"; cd.className = "countdown r-cd";
    cd.textContent = `↩ hold focus for ${out.rc}s`;
  } else if (out.cd !== null) {
    cd.style.display = "block";
    cd.className = `countdown ${out.status === "questionable" ? "q-cd" : "d-cd"}`;
    cd.textContent = `${out.cd}s`;
  } else { cd.style.display = "none"; }

  const t = T[mode];
  const pe = document.getElementById("pitch");
  pe.textContent = `${pose.pitch.toFixed(1)}°`;
  pe.className = `mv${pose.pitch > t.pitchUpLimit || pose.pitch < t.pitchDownLimit ? " bad" : Math.abs(pose.pitch) > 12 ? " warn" : ""}`;

  const ye = document.getElementById("yaw");
  ye.textContent = `${pose.yaw.toFixed(1)}°`;
  ye.className = `mv${Math.abs(pose.yaw) > t.yawLimit ? " bad" : Math.abs(pose.yaw) > 18 ? " warn" : ""}`;

  document.getElementById("blink").textContent  = `${bs.eyeBlinkLeft.toFixed(2)} / ${bs.eyeBlinkRight.toFixed(2)}`;
  document.getElementById("blink").className    = `mv${(bs.eyeBlinkLeft + bs.eyeBlinkRight)/2 > 0.55 ? " warn" : ""}`;
  const gazeOut = Math.max(bs.eyeLookOutLeft, bs.eyeLookOutRight);
  document.getElementById("gaze").textContent  = gazeOut.toFixed(2);
  document.getElementById("gaze").className    = `mv${gazeOut > 0.45 ? " warn" : ""}`;
  document.getElementById("lap").textContent   = hands.handInLap ? "⚠ in lap" : "—";
  document.getElementById("lap").className     = `mv${hands.handInLap ? " warn" : ""}`;
  document.getElementById("phone").textContent = phone ? "⚠ detected" : "—";
  document.getElementById("phone").className   = `mv${phone ? " bad" : ""}`;
}

init().catch(e => { log(`Init error: ${e.message}`, "error"); console.error(e); });
</script>
</body>
</html>
